<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Classroom</title>
    <style>
        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); user-select: none; -webkit-user-select: none; }
        body {
            background-color: #020204;
            background-image: 
                linear-gradient(rgba(18, 24, 38, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 24, 38, 0.5) 1px, transparent 1px),
                radial-gradient(circle at 50% 30%, rgba(99, 102, 241, 0.25) 0%, transparent 60%),
                radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.18) 0%, transparent 60%);
            background-size: 32px 32px, 32px 32px, auto, auto;
            color: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.22; pointer-events: none; }
        
        .glow-wrapper { position: relative; width: 440px; padding: 4px; border-radius: 28px; overflow: hidden; background: rgba(255, 255, 255, 0.02); box-shadow: 0 40px 100px rgba(0, 0, 0, 0.95); z-index: 10; }
        .glow-wrapper::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(#38bdf8, #a855f7, #ec4899, transparent, transparent, #38bdf8); animation: rotateGlow 3.5s linear infinite; z-index: 1; }
        @keyframes rotateGlow { 100% { transform: rotate(360deg); } }
        .box { position: relative; z-index: 2; text-align: center; background: #06070a; backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); padding: 55px 50px; border-radius: 24px; }
        
        .hud-display { position: absolute; top: 15px; right: 20px; font-family: monospace; font-size: 10px; color: #64748b; text-align: right; line-height: 1.4; }
        .hud-green { color: #34d399; }
        .brand-header { font-family: 'Impact', 'Arial Black', sans-serif; font-size: 42px; font-weight: 900; letter-spacing: 7px; background: linear-gradient(90deg, #38bdf8, #ec4899, #38bdf8); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; margin-bottom: 4px; filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.6)); animation: titleFlow 4s linear infinite; }
        @keyframes titleFlow { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
        
        .status-bar { display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 11px; color: #38bdf8; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 35px; font-family: monospace; background: rgba(56, 189, 248, 0.08); padding: 5px 16px; border-radius: 20px; border: 1px solid rgba(56, 189, 248, 0.15); }
        .pulse-dot { width: 6px; height: 6px; background: #38bdf8; border-radius: 50%; box-shadow: 0 0 10px #38bdf8; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.6; } 73% { transform: scale(1.1); box-shadow: 0 0 0 8px rgba(56, 189, 248, 0); } 100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); } }
        h2 { margin: 0 0 8px 0; font-size: 22px; font-weight: 800; letter-spacing: 2px; color: #ffffff; }
        .subtitle { font-size: 13px; color: #475569; margin-bottom: 35px; letter-spacing: 0.5px; min-height: 18px; font-family: monospace; }
        .input-group { position: relative; margin-bottom: 30px; }
        input { padding: 20px 24px; border: 1px solid #1a1d29; border-radius: 16px; width: 100%; background: #040407; color: #ffffff; font-size: 18px; outline: none; text-align: center; letter-spacing: 6px; font-family: 'Courier New', Courier, monospace; box-shadow: inset 0 4px 10px rgba(0,0,0,0.9); }
        input:focus { border-color: #ec4899; background: #010102; box-shadow: inset 0 4px 10px rgba(0,0,0,0.9), 0 0 30px rgba(236, 72, 153, 0.4); }
        
        .launch-btn { padding: 18px; background: linear-gradient(135deg, #38bdf8 0%, #7c3aed 50%, #ec4899 100%); background-size: 200% auto; color: #ffffff; border: none; border-radius: 16px; cursor: pointer; font-weight: 800; font-size: 16px; width: 100%; letter-spacing: 4px; box-shadow: 0 4px 25px rgba(124, 58, 237, 0.4); }
        .launch-btn:hover { background-position: right center; transform: translateY(-2px); box-shadow: 0 8px 35px rgba(236, 72, 153, 0.6); }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(15px); display: flex; justify-content: center; align-items: center; z-index: 10000; opacity: 0; pointer-events: none; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .error-card { background: #0c0507; border: 2px solid #ef4444; padding: 40px; border-radius: 20px; width: 360px; text-align: center; box-shadow: 0 0 40px rgba(239, 68, 68, 0.5); transform: scale(0.8); }
        .modal-overlay.active .error-card { transform: scale(1); }
        .error-icon { color: #ef4444; font-size: 46px; margin-bottom: 15px; font-weight: bold; }
        .error-title { font-size: 20px; font-weight: 900; color: #ffffff; margin-bottom: 10px; letter-spacing: 2px; }
        .error-msg { font-size: 13px; color: #94a3b8; margin-bottom: 30px; line-height: 1.6; }
        .error-btn { background: #ef4444; color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; letter-spacing: 2px; }
        .error-btn:hover { background: #dc2626; box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); }
        .fullscreen-iframe { position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 9999; background: #000000; }
        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: rgba(56, 189, 248, 0.1); z-index: 99999; pointer-events: none; animation: scan 6s linear infinite; }
        @keyframes scan { 0% { top: -10px; } 100% { top: 100%; } }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

<canvas id="bg-canvas"></canvas>
<div class="scanline"></div>

<div class="glow-wrapper">
    <div class="box">
        <div class="hud-display">FPS: <span class="hud-green" id="hud-fps">60.0</span><br>PING: <span class="hud-green">0.01ms</span><br>SECURE: <span style="color:#38bdf8;">MAX</span></div>
        <div class="brand-header">wunxch Game</div>
        <div class="status-bar"><div class="pulse-dot"></div><span id="terminal-stat">QUANTUM ANTIVIRUS ON</span></div>
        <h2>安全网关身份验证</h2>
        <div class="subtitle" id="typer-text"></div>
        <div class="input-group"><input type="password" id="pw" placeholder="ENTER ACCESS KEY" autocomplete="off"></div>
        <button class="launch-btn" onclick="verify()">解密并释放全局声卡</button>
    </div>
</div>

<div id="errorModal" class="modal-overlay">
    <div class="error-card">
        <div id="alert-sym" class="error-icon">🛑</div><div id="alert-tit" class="error-title">CRITICAL ERROR</div><div id="alert-txt" class="error-msg">身份凭证错误。<br>安全防御矩阵已拦截当前伪造请求。</div>
        <button class="error-btn" onclick="closeModal()">重置核心代码</button>
    </div>
</div>

<script>
    // 🛡️ 无限反注入调试回路 ＆ 控制台日志垃圾爆破防御
    setInterval(function() { 
        (function(a) { return (function(a) { return (typeof a === 'string' && (a.constructor === String || a.constructor.name === 'String')); })(a) && a.constructor('debugger')(); })('debugger'); 
        if (window.console && (window.console.firebug || window.console.exception)) { console.clear(); for(let i=0;i<100;i++){console.log("WUNXCH MATRIX INTERCEPT BLOCKED...");} }
    }, 250);

    // 1. 初始化高性能矩阵下落代码雨 Canvas
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()_+{}|:<>?";
    const fontSize = 16; const columns = canvas.width / fontSize;
    const rainDrops = Array(Math.floor(columns)).fill(1);
    function drawMatrix() {
        ctx.fillStyle = 'rgba(2, 2, 4, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#38bdf8'; ctx.font = fontSize + 'px monospace';
        for(let i = 0; i < rainDrops.length; i++) {
            const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
            ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
            if(rainDrops[i] * fontSize > canvas.height && Math.random() * 0.975 > 0.95) rainDrops[i] = 0;
            rainDrops[i]++;
        }
    }
    setInterval(drawMatrix, 30);

    let audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
    
    // 三频段真实物理机械键盘回响算法
    function playSynth(freq, duration, type="sine", vol=0.08) { try { initAudio(); if(!audioCtx) return; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime); gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration); } catch(e) {} }
    function playAlertSound() { playSynth(140, 0.4, "sawtooth"); setTimeout(() => playSynth(110, 0.4, "sawtooth"), 180); }
    function playSuccessSound() { playSynth(523, 0.12); setTimeout(() => playSynth(659, 0.12), 80); setTimeout(() => playSynth(784, 0.12), 160); setTimeout(() => playSynth(1046, 0.25), 240); }
    function playHackWarn() { playSynth(80, 0.8, "square"); playSynth(90, 0.8, "sawtooth"); }
    
    // 监听打字机按键实现三轴音频回响
    function playClickFeedback(key) {
        if (key === "Enter") {
            playSynth(880, 0.12, "sine", 0.12);
        } else if (key === "Backspace") {
            playSynth(220, 0.06, "triangle", 0.15); // 低沉删除音
        } else {
            playSynth(1300, 0.004, "triangle", 0.08); // 极清脆青轴
            playSynth(170, 0.015, "sine", 0.06);
        }
    }
    
    setInterval(() => { if(document.getElementById('hud-fps')) document.getElementById('hud-fps').innerHTML = (58.5 + Math.random() * 1.5).toFixed(1); }, 400);
    
    const textLog = "深度反编译死锁矩阵已注入，防御墙能级：100%..."; let txtIdx = 0;
    function typeWriter() { const typerNode = document.getElementById("typer-text"); if (typerNode && txtIdx < textLog.length) { typerNode.innerHTML += textLog.charAt(txtIdx); txtIdx++; setTimeout(typeWriter, 45); } }
    setTimeout(typeWriter, 400);

    window.addEventListener('keydown', function(e) { 
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'u') || (e.ctrlKey && e.key === 's')) { 
            e.preventDefault(); triggerHackDefense("内核熔断保护", "系统监测到非法的网络审查或反编译行为。\\\\n控制台爆破已启动，内存防御矩阵已锁死。"); 
        }
    });
    window.addEventListener('contextmenu', e => e.preventDefault());
    function triggerHackDefense(title, msg) { playHackWarn(); document.getElementById("alert-sym").innerHTML = "🚨"; document.getElementById("alert-tit").innerHTML = title; document.getElementById("alert-txt").innerHTML = msg; document.getElementById("errorModal").classList.add("active"); }
    
    const encData = ["DhUfCRxPSU4KFwsMUVkMHkESDxUDDA1bDw5EHQYRDxIDVg==","Tl5SWlUQCQVnREJTERJBTQhNT15OX0QET0UJb0dNSk9USVRLQF4LGw==","X0xDSEQCGBd2VlNBAABQXxlfXkxfTVUWXlcYfVZfW11FW0VZUUwY","BBgFHB9LQ0MwAggIW1QWC0IWBRgZGQ5fBQNeAAAAQw==","XkNCR0UNGRh3WVJOAQ9RUBhQX0NeQlQZX1gZcldQWlJEVERWUEMbBBlAV0RbGA=="];
    function xor_decrypt(e,t){try{const n=atob(e);let r="";for(let o=0;o<n.length;o++){const c=t[o%t.length];r+=String.fromCharCode(n.charCodeAt(o)^c.charCodeAt(0))}return r}catch(e){return""}}
    
    function verify(){
        initAudio(); playSynth(880, 0.08); const e=document.getElementById("pw").value; if(!e)return; let t=null;
        for(let r=0;r<encData.length;r++){let o=xor_decrypt(encData[r],e);if(0===o.indexOf("https://")){t=o;break}}
        if(t){
            playSuccessSound();
            setTimeout(() => {
                document.body.innerHTML='<iframe src="'+t+'" class="fullscreen-iframe" allow="autoplay; audio; microphone; camera; midi"></iframe>';
                document.title="Google Classroom";
                const keepVoiceAlive = () => { initAudio(); };
                window.addEventListener('keydown', keepVoiceAlive); window.addEventListener('mousedown', keepVoiceAlive);
                // 🔴 终极双轨常驻心跳：每1.5秒自动执行一次无感激活，保障Eaglercraft声音永久不灭！
                setInterval(initAudio, 1500);
            }, 450);
        }else{
            playAlertSound(); document.getElementById("errorModal").classList.add("active");
        }
    }
    function closeModal(){ playSynth(440, 0.05); document.getElementById("errorModal").classList.remove("active"); document.getElementById("alert-sym").innerHTML = "🛑"; document.getElementById("alert-tit").innerHTML = "CRITICAL ERROR"; document.getElementById("alert-txt").innerHTML = "身份凭证错误。<br>安全防御矩阵已拦截当前伪造请求。"; document.getElementById("pw").value=""; document.getElementById("pw").focus(); }
    
    // 三键程回响事件联动
    document.body.addEventListener('keydown', function(e) {
        if(document.getElementById('pw') && document.activeElement === document.getElementById('pw')) {
            if ("Enter" === e.key) { verify(); playClickFeedback("Enter"); }
            if ("Backspace" === e.key) { playClickFeedback("Backspace"); }
        }
    });
    document.body.addEventListener('keypress', function(e) {
        if(document.getElementById('pw') && document.activeElement === document.getElementById('pw')) {
            if (e.key !== "Enter") playClickFeedback("Normal");
        }
    });
</script>
</body>
</html>
