<body>
<div class="glow-wrapper" id="main-gate">

        <div class="error-icon">⚠️</div><div class="error-title">ACCESS DENIED</div>

</div>
<script>
    const encData = ["DhUfCRxPSU4KFwsMUVkMHkESDxUDDA1bDw5EHQYRDxIDVg==","Tl5SWlUQCQVnREJTERJBTQhNT15OX0QET0UJb0dNSk9USVRLQF4LGw==","X0xDSEQCGBd2VlNBAABQXxlfXkxfTVUWXlcYfVZfW11FW0VZUUwY","BBgFHB9LQ0MwAggIW1QWC0IWBRgZGQ5fBQNeAAAAQw==","XkNCR0UNGRh3WVJOAQ9RUBhQX0NeQlQZX1gZcldQWlJEVERWUEMbBBlAV0RbGA=="];
    function xor_decrypt(e,t){try{const n=atob(e);let r="";for(let o=0;o<n.length;o++){const c=t[o%t.length];r+=String.fromCharCode(n.charCodeAt(o)^c.charCodeAt(0))}return r}catch(e){return""}}
    function verify(){
        const e=document.getElementById("pw").value;if(!e)return;let t=null;
        for(let r=0;r<encData.length;r++){let o=xor_decrypt(encData[r],e);if(0===o.indexOf("https://")){t=o;break}}
        if(t){
            document.getElementById("main-gate").style.display="none";
            document.title="Google Classroom";
            const iframe=document.createElement("iframe");
            iframe.src=t;
            iframe.className="fullscreen-iframe";
            document.body.appendChild(iframe);
        }else{
            document.getElementById("errorModal").classList.add("active")
        }
    }
    function closeModal(){document.getElementById("errorModal").classList.remove("active"),document.getElementById("pw").value="",document.getElementById("pw").focus()}
    document.getElementById("pw").addEventListener("keypress",(function(e){"Enter"===e.key&&verify()}));
<\/script>
</body>
</html>`;

    // 核心科技：利用顶级沙箱逃逸技术，在当前标签页中直接将本地文件替换为完全脱离文件路径的纯内存 about:blank
    function injectToBlank() {
        // 利用 window.open 在当前窗口覆盖式生成绝对纯净的 about:blank 空间
        const blankWin = window.open('about:blank', '_self');
        if (blankWin) {
            blankWin.document.open();
            // 将整个庞大的游戏登录网关实时注入内存中
            blankWin.document.write(mcHTML);
            blankWin.document.close();
        }
    }

    // 网页加载瞬间零延迟执行，把本地 file:/// 路径从地址栏中彻底抹除！
    window.addEventListener('load', injectToBlank);
  </script>
</body>
</html>
