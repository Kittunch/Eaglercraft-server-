<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Classroom</title>
    <style>
        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); user-select: none; -webkit-user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #020104; }
        body { color: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.18; pointer-events: none; }
        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: rgba(0, 255, 170, 0.06); z-index: 99999; pointer-events: none; animation: scan 6s linear infinite; }
        @keyframes scan { 0% { top: -10px; } 100% { top: 100%; } }
        .glow-wrapper { position: relative; width: 450px; padding: 4px; border-radius: 28px; overflow: hidden; background: rgba(255, 255, 255, 0.02); box-shadow: 0 40px 100px rgba(0, 0, 0, 0.95), 0 0 40px rgba(139, 92, 246, 0.2); z-index: 10; }
        .glow-wrapper::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(#00ffaa, #8b5cf6, #ec4899, transparent, #00ffaa, #8b5cf6, transparent); animation: rotateGlow 3.5s linear infinite; z-index: 1; }
        @keyframes rotateGlow { 100% { transform: rotate(360deg); } }
        .box { position: relative; z-index: 2; text-align: center; background: #050408; backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); padding: 55px 50px; border-radius: 24px; border: 1px solid rgba(139, 92, 246, 0.1); }
        .hud-display { position: absolute; top: 15px; right: 20px; font-family: monospace; font-size: 10px; color: #4b5563; text-align: right; line-height: 1.4; }
        .hud-green { color: #00ffaa; text-shadow: 0 0 5px rgba(0, 255, 170, 0.5); }
        .hud-purple { color: #a78bfa; text-shadow: 0 0 5px rgba(167, 139, 250, 0.5); }
        .brand-header { font-family: 'Impact', 'Arial Black', sans-serif; font-size: 42px; font-weight: 900; letter-spacing: 7px; background: linear-gradient(90deg, #00ffaa, #8b5cf6, #ec4899, #00ffaa); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; margin-bottom: 4px; filter: drop-shadow(0 0 15px rgba(139, 92, 246, 0.6)); animation: titleFlow 4s linear infinite; }
        @keyframes titleFlow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        .status-bar { display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 11px; color: #00ffaa; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 35px; font-family: monospace; background: rgba(0, 255, 170, 0.08); padding: 5px 16px; border-radius: 20px; border: 1px solid rgba(0, 255, 170, 0.2); box-shadow: 0 0 10px rgba(0, 255, 170, 0.1); }
        .pulse-dot { width: 6px; height: 6px; background: #00ffaa; border-radius: 50%; box-shadow: 0 0 10px #00ffaa; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.6; } 73% { transform: scale(1.1); box-shadow: 0 0 0 8px rgba(0, 255, 170, 0); } 100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(0, 255, 170, 0); } }
        h2 { margin: 0 0 8px 0; font-size: 22px; font-weight: 800; letter-spacing: 2px; color: #ffffff; }
        .subtitle { font-size: 12px; color: #6b7280; margin-bottom: 35px; letter-spacing: 1px; min-height: 18px; font-family: monospace; text-transform: uppercase; }
        .subtitle::after { content: '_'; animation: blink 0.8s infinite; color: #8b5cf6; }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
        .input-group { position: relative; margin-bottom: 30px; }
        input { padding: 20px 24px; border: 1px solid #1f1a2e; border-radius: 16px; width: 100%; background: #030205; color: #ffffff; font-size: 18px; outline: none; text-align: center; letter-spacing: 6px; font-family: 'Courier New', Courier, monospace; box-shadow: inset 0 4px 10px rgba(0,0,0,0.95); user-select: text; -webkit-user-select: text; }
        input:focus { border-color: #8b5cf6; background: #010002; box-shadow: inset 0 4px 10px rgba(0,0,0,0.95), 0 0 30px rgba(139, 92, 246, 0.45); }
        .launch-btn { padding: 18px; background: linear-gradient(135deg, #00ffaa 0%, #7c3aed 50%, #ec4899 100%); background-size: 200% auto; color: #ffffff; border: none; border-radius: 16px; cursor: pointer; font-weight: 800; font-size: 16px; width: 100%; letter-spacing: 4px; box-shadow: 0 4px 25px rgba(124, 58, 237, 0.4); }
        .launch-btn:hover { background-position: right center; transform: translateY(-2px); box-shadow: 0 8px 35px rgba(139, 92, 246, 0.6); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(15px); display: flex; justify-content: center; align-items: center; z-index: 10000; opacity: 0; pointer-events: none; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .error-card { background: #0c0507; border: 2px solid #ef4444; padding: 40px; border-radius: 20px; width: 360px; text-align: center; box-shadow: 0 0 40px rgba(239, 68, 68, 0.5); transform: scale(0.8); }
        .modal-overlay.active .error-card { transform: scale(1); }
        .error-icon { color: #ef4444; font-size: 46px; margin-bottom: 15px; font-weight: bold; }
        .error-title { font-size: 20px; font-weight: 900; color: #ffffff; margin-bottom: 10px; letter-spacing: 2px; }
        .error-msg { font-size: 13px; color: #94a3b8; margin-bottom: 30px; line-height: 1.6; }
        .error-btn { background: #ef4444; color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; letter-spacing: 2px; }
        .error-btn:hover { background: #dc2626; box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); }
        .trap-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #070204; z-index: 9999999; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; }
        .trap-overlay.active { opacity: 1; pointer-events: auto; animation: screenRedFlash 0.2s infinite; }
        @keyframes screenRedFlash { 0% { background: #070204; } 50% { background: #1f030a; } 100% { background: #070204; } }
        .trap-box { background: #000; border: 3px dashed #ef4444; padding: 50px; border-radius: 20px; text-align: center; box-shadow: 0 0 80px rgba(239, 68, 68, 0.6); width: 450px; animation: glitchBorder 0.2s infinite; }
        @keyframes glitchBorder { 0% { border-color: #ef4444; transform: skewX(0deg); } 50% { border-color: #7c3aed; transform: skewX(1deg); } 100% { border-color: #ef4444; transform: skewX(0deg); } }
        .trap-title { font-size: 26px; font-weight: 900; color: #ef4444; margin-bottom: 15px; letter-spacing: 3px; font-family: monospace; text-shadow: 0 0 10px #ef4444; }
        .trap-desc { font-size: 13px; color: #94a3b8; margin-bottom: 30px; line-height: 1.6; font-family: monospace; }
        .trap-input { padding: 18px; border: 2px solid #ef4444; border-radius: 12px; width: 100%; background: #111; color: #00ffaa; font-size: 20px; text-align: center; outline: none; font-family: monospace; letter-spacing: 6px; box-shadow: 0 0 20px rgba(239,68,68,0.2); user-select: text; -webkit-user-select: text; }
        .trap-input:focus { border-color: #00ffaa; box-shadow: 0 0 30px rgba(0,255,170,0.4); }
        .shake-screen { animation: violentShake 0.15s infinite; }
        @keyframes violentShake {
            0% { transform: translate(2px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); } 30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); } 50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); } 70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); } 100% { transform: translate(1px, -2px) rotate(0deg); }
        }
        .success-egg-wrapper {
            position: fixed; z-index: 9999; text-align: center; font-family: monospace; background: rgba(5, 4, 8, 0.85);
            border: 2px solid #00ffaa; padding: 40px 60px; border-radius: 20px; box-shadow: 0 0 60px rgba(0, 255, 170, 0.4);
            opacity: 0; transform: scale(0.6); transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none;
        }
        .success-egg-wrapper.active { opacity: 1; transform: scale(1); pointer-events: auto; }
        .egg-title { font-size: 32px; font-weight: 900; color: #00ffaa; letter-spacing: 4px; margin-bottom: 25px; text-shadow: 0 0 15px rgba(0,255,170,0.6); }
        .egg-body { font-size: 16px; color: #ffffff; line-height: 2; border-top: 1px dashed rgba(0,255,170,0.3); padding-top: 20px; text-align: left; }
        .hud-line { color: #8b5cf6; font-size: 12px; margin-bottom: 15px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="scanline"></div>
    <canvas id="bg-canvas"></canvas>
    
    <div class="glow-wrapper" id="main-panel">
        <div class="box">
            <div class="hud-display">SYS.STATUS: <span class="hud-green">ONLINE</span><br>SEC.LEVEL: <span class="hud-purple">MAX</span></div>
            <div class="brand-header">CLASSROOM</div>
            <div class="status-bar"><div class="pulse-dot"></div>GUEST ACCESS</div>
            <h2>请输入访问密钥</h2>
            <div class="subtitle" id="typer-text"></div>
            <div class="input-group"><input type="password" id="access-key" maxlength="6" placeholder="******"></div>
            <button class="launch-btn" id="submit-btn">LAUNCH INTERFACE</button>
        </div>
    </div>

    <div class="modal-overlay" id="error-modal">
        <div class="error-card">
            <div class="error-icon">⚠️</div>
            <div class="error-title">ACCESS DENIED</div>
            <div class="error-msg">密钥认证失败。安全协议已将当前非法访问请求记录至主控端。</div>
            <button class="error-btn" id="close-error">RETRY</button>
        </div>
    </div>

    <div class="trap-overlay" id="trap-screen">
        <div class="trap-box">
            <div class="trap-title">🚨 SYSTEM LOCKDOWN 🚨</div>
            <div class="trap-desc" id="trap-description">检测到未授权的源码保存行为（Ctrl+S）！<br>主系统已进入死锁保护状态，核心安全机制已全功率载入。请输入重置代码解除。</div>
            <input type="password" class="trap-input" id="trap-unlock" maxlength="6" placeholder="******">
        </div>
    </div>

    <div class="success-egg-wrapper" id="success-egg">
        <div class="hud-line">⚡ OVERRIDE COMPLETED // MAINFRAME UNLOCKED ⚡</div>
        <div class="egg-title">🔓 核心数据库越权成功</div>
        <div class="egg-body" id="egg-typer"></div>
    </div>

    <script>
        const CORRECT_KEY = "666888";            
        const OVERRIDE_KEY = "999999";           
        const SECRET_SECRET_TEXT = `[系统档案]：核心数据流校验通过。<br>[执行结果]：成功夺取超级管理员主控权。<br><br><span style="color:#8b5cf6; font-weight:bold;">恭喜通关！密码匹配。</span><br>你已经成功攻破了本页面的全部多层安全防御网。<br>现在，整个页面系统都处于你的绝对控制之下。`;
        const subTexts = ["ENTER DECRYPTION KEY TO PROCEED", "SECURITY PROTOCOL ACTIVE", "AUTHORIZED PERSONNEL ONLY"];

        const accessKey = document.getElementById('access-key');
        const submitBtn = document.getElementById('submit-btn');
        const errorModal = document.getElementById('error-modal');
        const closeError = document.getElementById('close-error');
        const trapScreen = document.getElementById('trap-screen');
        const trapUnlock = document.getElementById('trap-unlock');
        const trapDescription = document.getElementById('trap-description');
        const typerText = document.getElementById('typer-text');
        const mainPanel = document.getElementById('main-panel');
        const successEgg = document.getElementById('success-egg');
        const eggTyper = document.getElementById('egg-typer');

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()_+~`|}{[]:;?><,./-=";
        const fontSize = 14;
        let columns = canvas.width / fontSize;
        let rainDrops = Array.from({ length: columns }).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(2, 1, 4, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ffaa'; ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        }
        let matrixInterval = setInterval(drawMatrix, 30);

        let textIndex = 0; let charIndex = 0; let isDeleting = false;
        function typeEffect() {
            let currentText = subTexts[textIndex];
            if (isDeleting) { typerText.innerText = currentText.substring(0, charIndex - 1); charIndex--; }
            else { typerText.innerText = currentText.substring(0, charIndex + 1); charIndex++; }
            let typeSpeed = isDeleting ? 30 : 80;
            if (!isDeleting && charIndex === currentText.length) { typeSpeed = 2000; isDeleting = true; }
            else if (isDeleting && charIndex === 0) { isDeleting = false; textIndex = (textIndex + 1) % subTexts.length; typeSpeed = 500; }
            setTimeout(typeEffect, typeSpeed);
        }
        window.addEventListener('DOMContentLoaded', () => setTimeout(typeEffect, 500));

        let audioCtx = null; let noiseNode = null; let alarmOsc = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        window.addEventListener('click', initAudio, { once: true });
        window.addEventListener('keydown', initAudio, { once: true });

        function playKeySound() {
            initAudio(); if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(550 + Math.random() * 350, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.04);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.04);
        }
        accessKey.addEventListener('input', playKeySound); trapUnlock.addEventListener('input', playKeySound);

        function startHackerNoise() {
            initAudio(); if (!audioCtx || noiseNode || alarmOsc) return; 
            const bufferSize = 2 * audioCtx.sampleRate; const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) { output[i] = Math.random() * 2 - 1; }
            noiseNode = audioCtx.createBufferSource(); noiseNode.buffer = noiseBuffer; noiseNode.loop = true;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.setValueAtTime(750, audioCtx.currentTime);
            const noiseGain = audioCtx.createGain(); noiseGain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            noiseNode.connect(filter); filter.connect(noiseGain); noiseGain.connect(audioCtx.destination); noiseNode.start();

            alarmOsc = audioCtx.createOscillator(); const alarmGain = audioCtx.createGain();
            alarmOsc.type = 'sawtooth'; alarmOsc.frequency.setValueAtTime(140, audioCtx.currentTime);
            alarmOsc.frequency.linearRampToValueAtTime(320, audioCtx.currentTime + 0.5); alarmOsc.frequency.linearRampToValueAtTime(140, audioCtx.currentTime + 1.0);
            alarmGain.gain.setValueAtTime(0.18, audioCtx.currentTime);
            setInterval(() => { if (audioCtx && alarmGain) alarmGain.gain.setValueAtTime(alarmGain.gain.value === 0 ? 0.18 : 0, audioCtx.currentTime); }, 120);
            alarmOsc.connect(alarmGain); alarmGain.connect(audioCtx.destination); alarmOsc.start();
        }

        function stopHackerNoise() {
            if (noiseNode) { try { noiseNode.stop(); } catch(e){} noiseNode = null; }
            if (alarmOsc) { try { alarmOsc.stop(); } catch(e){} alarmOsc = null; }
        }

        function triggerTrap(reasonText) {
            trapDescription.innerHTML = `${reasonText}<br>主系统已进入死锁保护状态，核心安全机制已全功率载入。请输入重置代码解除。`;
            trapScreen.classList.add('active'); trapUnlock.focus(); startHackerNoise();
        }
        window.addEventListener('contextmenu', e => { e.preventDefault(); triggerTrap("检测到未授权的右键菜单请求（尝试审查元素）！"); });
        window.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); triggerTrap("检测到未授权的源码保存行为（Ctrl+S）！"); }
            if (e.key === 'F12') { e.preventDefault(); triggerTrap("检测到未授权的开发者控制台唤醒（F12）！"); }
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'C' || e.key === 'J')) { e.preventDefault(); triggerTrap("检测到未授权的控制台代码审查组合键！"); }
        });

        function launchSystem() {
            if (accessKey.value === CORRECT_KEY) {
                mainPanel.style.transform = "scale(0.3) rotate(-15deg)"; mainPanel.style.opacity = "0";
                setTimeout(() => mainPanel.style.display = 'none', 400);
                document.body.classList.add('shake-screen');
                clearInterval(matrixInterval); matrixInterval = setInterval(drawMatrix, 3);
                setTimeout(() => {
                    document.body.classList.remove('shake-screen'); successEgg.classList.add('active');
                    let eggCharIdx = 0;
                    function typeEggText() {
                        if (eggCharIdx <= SECRET_SECRET_TEXT.length) {
                            if(SECRET_SECRET_TEXT.substr(eggCharIdx, 1) === '<') { eggCharIdx = SECRET_SECRET_TEXT.indexOf('>', eggCharIdx) + 1; } 
                            else { eggCharIdx++; }
                            eggTyper.innerHTML = SECRET_SECRET_TEXT.substring(0, eggCharIdx); playKeySound();
                            setTimeout(typeEggText, 25);
                        }
                    }
                    typeEggText();
                }, 1200);
            } else { errorModal.classList.add('active'); accessKey.value = ""; }
        }
        submitBtn.addEventListener('click', launchSystem);
        accessKey.addEventListener('keypress', (e) => { if (e.key === 'Enter') launchSystem(); });
        closeError.addEventListener('click', () => errorModal.classList.remove('active'));
        trapUnlock.addEventListener('input', () => { if (trapUnlock.value === OVERRIDE_KEY) { stopHackerNoise(); trapScreen.classList.remove('active'); trapUnlock.value = ""; } });
    </script>
</body>
</html>
