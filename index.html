  <style>

  <script>
    // 基础母网页画布粒子动效
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;
    const cols = Math.floor(w / 20);
    const yPos = Array(cols).fill(0);
    function drawMatrix() {
      ctx.fillStyle = 'rgba(2, 2, 4, 0.05)'; ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = '#00f0ff'; ctx.font = '15px monospace';
      yPos.forEach((y, idx) => {
        const text = String.fromCharCode(Math.floor(Math.random() * 128));
        const x = idx * 20; ctx.fillText(text, x, y);
        if (y > 100 + Math.random() * 10000) yPos[idx] = 0; else yPos[idx] = y + 20;
      });
    }
    setInterval(drawMatrix, 50);
    window.addEventListener('resize', () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; });

        .wave-bar { width: 3px; height: 100%; background: #00f0ff; animation: dance 1s ease-in-out infinite alternate; }
        @keyframes dance { 0% { transform: scaleY(0.1); } 100% { transform: scaleY(1); } }
        .minigame-container { position: absolute; top:0; left:0; width:100%; height:100%; background:#07080c; z-index: 100; padding: 40px; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .minigame-grid { display: grid; grid-template-columns: repeat(4, 70px); grid-gap: 15px; margin: 30px 0; }

        .minigame-cell:hover { border-color: #00f0ff; color: #00f0ff; background: rgba(0,240,255,0.05); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2,2,4,0.9); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; }

<body>

    <div id="quantum-space">
        <div class="cyber-grid"></div>
    </div>

    <div class="main-frame-wrapper">

            <div>
                <div class="brand-zone">
                    <div class="neon-logo">WUNXCH CORE</div>
                    <div class="status-badge"><div class="status-dot"></div><span>Secure Node Connected</span></div>
                </div>
                <div class="node-selector">
                    <div class="node-title">选择可用节点</div>
                    <div class="node-card active" onclick="switchNode(0, this)">
                        <div class="node-info"><h4>节点 #01 - 主线区</h4><p>Eaglercraft 经典版</p></div>
                        <div class="node-status"></div>
                    </div>
                    <div class="node-card" onclick="switchNode(1, this)">
                        <div class="node-info"><h4>节点 #02 - 备用线</h4><p>Eaglercraft 增强端</p></div>
                        <div class="node-status"></div>
                    </div>
                    <div class="node-card" onclick="switchNode(2, this)">
                        <div class="node-info"><h4>节点 #03 - 终极线</h4><p>Eaglercraft-3 Wasm</p></div>
                        <div class="node-status"></div>
                    </div>
                </div>
            </div>
            <!-- 黑客日志滚动输出区 -->
            <div class="terminal-log-box" id="log-box"></div>

        <!-- 中央主控密码解锁区 -->
        <div class="central-hub">
            <div class="input-container">
                <div class="gate-title">网关身份验证</div>
                <div class="subtitle gate-desc">请输入量子授权代码解锁主程序节点</div>
                <div class="crypto-input-wrap">
                    <input type="password" id="pw" placeholder="ENTER KEY CODE" autocomplete="off">
                </div>
                <button class="submit-btn" onclick="verifyQuantumKey()">解密并接入</button>
                <div class="aux-tools">
                    <span class="tool-link" onclick="openMinigame()">紧急数字破译模式</span>
                    <span class="tool-link" onclick="toggleMute()">频率监听</span>
                </div>
            </div>
            <!-- 音频音波仿真器 -->
            <div class="audio-wave-visualization" id="wave-container"></div>
        </div>

        <!-- 隐藏的黑客破解迷你小游戏组件 -->
        <div class="minigame-container" id="minigame-screen">
            <div class="gate-title">数字矩阵重组破译</div>
            <div class="gate-desc">匹配相同的二进制校验块强行刺穿防火墙</div>
            <div class="minigame-grid" id="mg-grid"></div>
            <button class="submit-btn" style="width:200px; background:#22263b; border:1px solid #3d4466;" onclick="closeMinigame()">放弃回退</button>
        </div>
    </div>

    <!-- 内置高精级报错模块 -->
    <div id="errorModal" class="modal-overlay">
        <div class="error-card">
            <div class="error-icon">🛑</div>
            <div class="error-title">DECRYPTION FAILED</div>
            <div class="error-msg">安全凭证校验失败！系统拒绝向非授权节点分配主程序访问链路。</div>
            <button class="error-btn" onclick="closeModal()">重构序列</button>
        </div>
    </div>

    <script>
        // 核心动态滚屏日志生成代码
        const logs = [
            "Initializing secure protocol...", "Establishing tunnel over port 443...",
            "Loading index data maps...", "Syncing local database chunks...",
            "Quantum grid mesh operational.", "Awaiting user encryption key...",
            "WARNING: Intrusive signature detected from gateway.", "Bypassing anti-bot inspection rules...",
            "Sub-node allocation pool cleared.", "Ready for credential decapsulation."
        ];
        const logBox = document.getElementById('log-box');
        function appendLog() {
          const line = document.createElement('div');
          line.className = 'log-line';
          if(Math.random() > 0.7) line.className += ' cyan';
          if(Math.random() > 0.9) line.className += ' pink';
          line.innerText = \`[\${new Date().toLocaleTimeString()}] \` + logs[Math.floor(Math.random() * logs.length)];
          logBox.appendChild(line);
          if(logBox.childNodes.length > 30) logBox.removeChild(logBox.firstChild);
          logBox.scrollTop = logBox.scrollHeight;
        }
        setInterval(appendLog, 1200);
        for(let i=0; i<8; i++) appendLog();

        // 音波可视化仿真柱
        const waveContainer = document.getElementById('wave-container');
        for(let i=0; i<30; i++) {
          const bar = document.createElement('div');
          bar.className = 'wave-bar';
          bar.style.animationDelay = \`-\${Math.random()}s\`;
          bar.style.animationDuration = (0.4 + Math.random() * 0.8) + 's';
          waveContainer.appendChild(bar);
        }

        // 节点快捷选区变量
        let currentNodeIdx = 0;
        function switchNode(idx, elem) {
          currentNodeIdx = idx;
          document.querySelectorAll('.node-card').forEach(c => c.classList.remove('active'));
          elem.classList.add('active');
          const line = document.createElement('div');
          line.className = 'log-line cyan';
          line.innerText = \`[SYSTEM] Switched access tunnel to Node #0\${idx+1}.\`;
          logBox.appendChild(line);
        }

        // 5个高强度密文数据
        const encData = [
            "DhUfCRxPSU4KFwsMUVkMHkESDxUDDA1bDw5EHQYRDxIDVg==",
            "Tl5SWlUQCQVnREJTERJBTQhNT15OX0QET0UJb0dNSk9USVRLQF4LGw==",
            "X0xDSEQCGBd2VlNBAABQXxlfXkxfTVUWXlcYfVZfW11FW0VZUUwY",
            "BBgFHB9LQ0MwAggIW1QWC0IWBRgZGQ5fBQNeAAAAQw==",
            "XkNCR0UNGRh3WVJOAQ9RUBhQX0NeQlQZX1gZcldQWlJEVERWUEMbBBlAV0RbGA=="
        ];

        function xor_decrypt(enc_str, key) {
            try {
                const decoded = atob(enc_str);
                let result = "";
                for (let i = 0; i < decoded.length; i++) {
                    const key_c = key[i % key.length];
                    result += String.fromCharCode(decoded.charCodeAt(i) ^ key_c.charCodeAt(0));
                }
                return result;
            } catch(e) { return ""; }
        }

        // 核心校验解密
        function verifyQuantumKey() {
            const pw = document.getElementById('pw').value;
            if (!pw) return;
            let targetUrl = null;
            for (let i = 0; i < encData.length; i++) {
                let decrypted = xor_decrypt(encData[i], pw);
                if (decrypted.indexOf("https://") === 0) { targetUrl = decrypted; break; }
            }
            if (targetUrl) {
                document.body.innerHTML = '<iframe src="' + targetUrl + '" class="fullscreen-iframe"></iframe>';
                document.title = "Google Classroom";
            } else {
                document.getElementById('errorModal').classList.add('active');
            }
        }

        function closeModal() {
            document.getElementById('errorModal').classList.remove('active');
            document.getElementById('pw').value = '';
            document.getElementById('pw').focus();
        }

        // 迷你黑客解密互动游戏逻辑（越庞大越过瘾）
        let selectedCells = [];
        function openMinigame() {
            document.getElementById('minigame-screen').style.display = 'flex';
            const grid = document.getElementById('mg-grid');
            grid.innerHTML = '';
            selectedCells = [];
            const hexPool = ['0F','A6','D4','8B','E2','0F','A6','D4','8B','E2','7C','FF','7C','FF','3E','3E'];
            hexPool.sort(() => Math.random() - 0.5);
            hexPool.forEach((val, idx) => {
                const cell = document.createElement('div');
                cell.className = 'minigame-cell';
                cell.dataset.val = val;
                cell.innerText = '??';
                cell.onclick = () => {
                    if(cell.classList.contains('matched') || selectedCells.includes(cell) || selectedCells.length >= 2) return;
                    cell.innerText = val; cell.style.color = '#00f0ff';
                    selectedCells.push(cell);
                    if(selectedCells.length === 2) {
                        setTimeout(() => {
                            if(selectedCells[0].dataset.val === selectedCells[1].dataset.val) {
                                selectedCells[0].classList.add('matched'); selectedCells[1].classList.add('matched');
                                if(document.querySelectorAll('.minigame-cell.matched').length === 16) {
                                    alert('⚡ 矩阵防火墙已被刺穿！提示：试试用默认核心密匙 [ 7878 ] 或 [ 6767 ] 登入！');
                                    closeMinigame();
                                }
                            } else {
                                selectedCells[0].innerText = '??'; selectedCells[0].style.color = '';
                                selectedCells[1].innerText = '??'; selectedCells[1].style.color = '';
                            }
                            selectedCells = [];
                        }, 500);
                    }
                };
                grid.appendChild(cell);
            });
        }
        function closeMinigame() { document.getElementById('minigame-screen').style.display = 'none'; }
        function toggleMute() { alert('🔊 频率发生器正在监听当前的量子跳频。'); }
        document.getElementById('pw').addEventListener('keypress', function (e) { if (e.key === 'Enter') verifyQuantumKey(); });
    <\/script>
</body>
</html>`;

    // 真正的沙箱逃逸灌注技术：手动触发建立完美的 about:blank 干净纯空内存环境
    function openQuantumBlank() {
      const blankWin = window.open('about:blank', '_blank');
      if (blankWin) {
        blankWin.document.open();
        blankWin.document.write(gigabyteCoreHTML);
        blankWin.document.close();
      } else {
        alert('❌ 触发系统核心熔断：弹窗被浏览器死死拦截！请在Chrome网址栏右侧点击“始终允许此网站的弹窗”后重新启动！');
      }
    }
  </script>
</body>
</html>
