  <script>

        }
        /* 2. wunxch Game 渐变拉丝闪烁霓虹字 */

        /* 3. 安全终端指示栏 */
        .status-bar {
            display: inline-flex;

            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 40px;
            font-family: monospace;
            background: rgba(56, 189, 248, 0.1);
            padding: 4px 14px;
            border-radius: 20px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }
        .pulse-dot {
            width: 6px;
            height: 6px;
            background: #38bdf8;
            border-radius: 50%;
            box-shadow: 0 0 10px #38bdf8;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            73% { transform: scale(1.1); box-shadow: 0 0 0 8px rgba(56, 189, 248, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }

        /* 4. 史诗级流光环绕卡片外壳 */
        .glow-wrapper {
            position: relative;
            width: 410px;
            padding: 3px; /* 留出流动边框的厚度 */
            border-radius: 26px;
            overflow: hidden;

            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.9);
        }
        /* 利用伪元素制作绕圈旋转的流光线 */
        .glow-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;

            width: 200%;

            animation: rotateGlow 4s linear infinite;
            z-index: 1;
        }
        @keyframes rotateGlow {
            100% { transform: rotate(360deg); }
        }
        /* 5. 内部机甲暗黑毛玻璃层 */
        .box {
            position: relative;
            z-index: 2; /* 压在流光线上面 */
            text-align: center;
            background: #0b0c10;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 50px 45px;
            border-radius: 24px;
        }
        h2 {
            margin: 0 0 8px 0;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #ffffff;
        }
        .subtitle {
            font-size: 13px;
            color: #475569;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }
        /* 6. 高阶黑客下沉式输入框 */
        .input-group {
            position: relative;
            margin-bottom: 30px;
        }
        input {
            padding: 18px 20px;
            border: 1px solid #1e2230;
            border-radius: 14px;
            width: 100%;
            background: #050508;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            text-align: center;
            letter-spacing: 6px;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.9);
        }
        input:focus {
            border-color: #ec4899;
            background: #020203;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.9), 0 0 25px rgba(236, 72, 153, 0.35);
        }
        input::placeholder {
            color: #334155;
            letter-spacing: 0px;
            font-size: 13px;
            font-family: sans-serif;
            font-weight: 600;
        }
        /* 7. 超能粒子引擎流光按钮 */
        button {
            padding: 18px;
            background: linear-gradient(135deg, #38bdf8 0%, #7c3aed 50%, #ec4899 100%);
            background-size: 200% auto;
            color: #ffffff;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 800;
            font-size: 16px;
            width: 100%;
            letter-spacing: 4px;
            box-shadow: 0 4px 25px rgba(124, 58, 237, 0.4);
        }
        button:hover {
            background-position: right center;
            transform: translateY(-2px);
            box-shadow: 0 8px 35px rgba(236, 72, 153, 0.6);
        }
        button:active {
            transform: translateY(1px);
        }
        .fullscreen-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 9999;
            background: #000000;
        }
    </style>
</head>
<body>
<!-- 外层跑马灯流光线包裹器 -->
<div class="glow-wrapper">
    <!-- 内层黑客卡片 -->
    <div id="login-box" class="box">
        <div class="brand-header">wunxch Game</div>
        <div class="status-bar">
            <div class="pulse-dot"></div>
            <span>QUANTUM NODE SECURED</span>
        </div>
        <h2>网关身份验证</h2>
        <div class="subtitle">请输入访问凭证解密主程序</div>
        <div class="input-group">
            <input type="password" id="pw" placeholder="ENTER ACCESS KEY" autocomplete="off">
        </div>
        <button onclick="verify()">解密并进入</button>
    </div>
</div>

<script>
    const encData = [
        "DhUfCRxPSU4KFwsMUVkMHkESDxUDDA1bDw5EHQYRDxIDVg==",
        "Tl5SWlUQCQVnREJTERJBTQhNT15OX0QET0UJb0dNSk9USVRLQF4LGw==",
        "X0xDSEQCGBd2VlNBAABQXxlfXkxfTVUWXlcYfVZfW11FW0VZUUwY",
        "BBgFHB9LQ0MwAggIW1QWC0IWBRgZGQ5fBQNeAAAAQw==",
        "XkNCR0UNGRh3WVJOAQ9RUBhQX0NeQlQZX1gZcldQWlJEVERWUEMbBBlAV0RbGA=="
    ];

    function xor_decrypt(enc_str, key) {
        try {
            const decoded = atob(enc_str);
            let result = "";
            for (let i = 0; i < decoded.length; i++) {
                const key_c = key[i % key.length];
                result += String.fromCharCode(decoded.charCodeAt(i) ^ key_c.charCodeAt(0));
            }
            return result;
        } catch(e) {
            return "";
        }
    }

    function verify() {
        const pw = document.getElementById('pw').value;
        if (!pw) return;
        
        let targetUrl = null;
        for (let i = 0; i < encData.length; i++) {
            let decrypted = xor_decrypt(encData[i], pw);
            if (decrypted.indexOf("https://") === 0) {
                targetUrl = decrypted;
                break;
            }
        }

        if (targetUrl) {
            document.body.innerHTML = '<iframe src="' + targetUrl + '" class="fullscreen-iframe"></iframe>';
            document.title = "Google Classroom";
        } else {
            alert("🔒 错误：访问密钥无效，解密失败！");
        }
    }

    document.getElementById('pw').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') verify();
    });
<\/script>
</body>
</html>`;

    function openBlank() {
      const blankWin = window.open('about:blank', '_blank');
      if (blankWin) {
        blankWin.document.open();
        blankWin.document.write(mcHTML);
        blankWin.document.close();
        window.location.replace('about:blank');
      } else {
        alert('弹窗被浏览器拦截，请允许弹窗后刷新页面重试。');
      }
    }

    window.addEventListener('load', function() {
      setTimeout(openBlank, 100);
    });
  </script>
</body>
</html>
</body>
