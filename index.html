<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>WUNXCH CORE SYSTEM v10.0.5 - INITIALIZING</title>
  <style>
    /* 让最开始的母网页直接变黑，彻底隐藏任何加载痕迹 */
    body { background-color: #030305; margin: 0; padding: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .btn { padding: 24px 60px; background: linear-gradient(135deg, #38bdf8 0%, #7c3aed 100%); color: white; border: none; border-radius: 16px; font-size: 20px; font-weight: 900; letter-spacing: 6px; cursor: pointer; box-shadow: 0 0 40px rgba(124, 58, 237, 0.5); }
  </style>
</head>
<body>

  <!-- 手动点击按钮触发，100% 绕过浏览器的广告弹窗拦截机制 -->
  <button class="btn" onclick="bootClientToBlank()">LAUNCH WUNXCH CORE</button>

  <script>
    // 核心注入函数：强行在 about:blank 的内存深处唤醒游戏
    function bootClientToBlank() {
      // 1. 强行在新标签页打开一个绝对空无一物的真实 about:blank 页面
      const blankWin = window.open('about:blank', '_blank');
      if (blankWin) {
        // 2. 利用网络请求去读取你放在旁边的真正游戏核心代码文件
        fetch('core.html')
          .then(response => response.text())
          .then(htmlData => {
            blankWin.document.open();
            // 3. 将所有代码、黑客卡片、eagtek引擎强行塞进 about:blank 的内存中，切断任何物理路径联系
            blankWin.document.write(htmlData);
            blankWin.document.close();
          })
          .catch(err => {
            alert('读取核心文件 core.html 失败，请确保 core.html 和本启动器在同一个文件夹内！');
          });
      } else {
        alert('弹窗被浏览器拦截，请在浏览器右上角地址栏右侧允许该网站弹窗后重试。');
      }
    }
  </script>
</body>
</html>
